[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Clean hidden admin URL: /admin -> admin.html
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Keep admin out of search engines
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
